<script>
const API_URL       = "https://script.google.com/macros/s/AKfycbztT7xbTXNHbcq-fJ3oU9swW0wHFob7qG8mhM5bufJo6EZ2aNjmV8nUYPN4aaeIMwOt/exec";
const SPEND_API_URL = "https://script.google.com/macros/s/AKfycbzpHcCTz_3EV66bjHi-8w0sLRDhWYT9adQlxqo7QILh4UR8-X2jVsJvCazsB0SM2SWX/exec";
const COSTS_API_URL = "https://script.google.com/macros/s/AKfycbzLD2hj3oNHUNajjghO-fNMYU8vVUZicA1DyJzPII6hBJoL3t2qfOnwwAfv56xr2yOQ/exec";

const STATUS_TARGET="якісний";
let globalLeads=[],globalAdvs=[],globalSpend=[],globalCosts=[];
let selectedMonths=[];

const SOURCES=[
    {key:'fb_eco',   label:'FB Ecoforma'},
    {key:'fb_wood',  label:'FB Wood Agency'},
    {key:'site_eco', label:'Сайт EcoForma'},
    {key:'site_wood',label:'Сайт Wood Agency'},
    {key:'olx',      label:'OLX'},
];

const SRC_MATCH=[
    {key:'fb_eco',   t:(s,m)=>s.includes('facebook')&&(s.includes('ecoforma')||s.includes('екоформа'))&&!s.includes('дзвінок')},
    {key:'fb_eco',   t:(s,m)=>s.includes('дзвінок')&&s.includes('facebook')&&(s.includes('ecoforma')||s.includes('екоформа'))},
    {key:'fb_wood',  t:(s,m)=>s.includes('facebook')&&(s.includes('wood')||s.includes('вуд'))&&!s.includes('дзвінок')},
    {key:'fb_wood',  t:(s,m)=>s.includes('дзвінок')&&s.includes('facebook')&&(s.includes('wood')||s.includes('вуд'))},
    {key:'site_eco', t:(s,m)=>(s.includes('ecoforma')||s.includes('екоформа'))&&!s.includes('facebook')&&!s.includes('дзвінок')},
    {key:'site_eco', t:(s,m)=>s.includes('дзвінок')&&(s.includes('ecoforma')||s.includes('екоформа'))&&!s.includes('facebook')},
    {key:'site_wood',t:(s,m)=>(s.includes('wood')||s.includes('відповідальним'))&&!s.includes('facebook')&&!s.includes('дзвінок')},
    {key:'site_wood',t:(s,m)=>s.includes('дзвінок')&&(s.includes('wood')||m.includes('савчук'))},
    {key:'olx',      t:(s,m)=>s.includes('olx')},
];

const SPEND_MAP=[
    {t:s=>s.includes('ecoforma')&&!s.includes('google'),keys:['fb_eco']},
    {t:s=>s.includes('wood')&&!s.includes('google'),    keys:['fb_wood']},
    {t:s=>s.includes('google')&&s.includes('ecoforma'), keys:['site_eco']},
    {t:s=>s.includes('google')&&s.includes('wood'),     keys:['site_wood']},
    {t:s=>s.includes('olx'),                            keys:['olx']},
];

const MN={'01':'Січень','02':'Лютий','03':'Березень','04':'Квітень','05':'Травень','06':'Червень','07':'Липень','08':'Серпень','09':'Вересень','10':'Жовтень','11':'Листопад','12':'Грудень'};

const pd=str=>{
    if(!str)return new Date(0);
    const s=String(str).trim();
    if(s.includes('T')||s.match(/^\d{4}-\d{2}-\d{2}/))return new Date(s);
    const p=s.split(/[. :]/);
    if(p.length>=3)return new Date(+p[2],+p[1]-1,+p[0]);
    return new Date(s);
};
const getMK=str=>{
    const s=String(str).trim();
    const m1=s.match(/^(\d{1,2})[.\/-](\d{4})$/);if(m1)return m1[2]+'-'+m1[1].padStart(2,'0');
    const m2=s.match(/^(\d{4})[.\/-](\d{1,2})$/);if(m2)return m2[1]+'-'+m2[2].padStart(2,'0');
    return s;
};
const fmtMK=k=>{const p=k.split('-');return p.length===2?(MN[p[1]]||p[1])+' '+p[0]:k;};
const fmtM=n=>(!n||n===0)?'—':Math.round(n).toLocaleString('uk-UA')+' ₴';
const pct=(a,b)=>(!b||!a)?'—':(a/b*100).toFixed(1)+'%';
const diff=(a,b)=>{
    if(!a||!b)return '';
    const d=((a-b)/b*100);
    const cls=d>0?'text-red-400':'text-emerald-400'; // для витрат ріст = погано
    return `<span class="text-[10px] ${cls}">${d>0?'▲':'▼'}${Math.abs(d).toFixed(1)}%</span>`;
};

function findSrc(src,mgr){
    const s=String(src||'').toLowerCase().trim(),m=String(mgr||'').toLowerCase().trim();
    for(const r of SRC_MATCH)if(r.t(s,m))return r.key;
    return null;
}

function mapCostsSrc(srcRaw){
    const s=srcRaw.toLowerCase().trim();
    if(s.includes('ecoforma')||s.includes('ecofo'))return s.includes('сайт')||s.includes('site')?['site_eco']:['fb_eco'];
    if(s.includes('wood'))return s.includes('сайт')||s.includes('site')?['site_wood']:['fb_wood'];
    if(s.includes('olx'))return['olx'];
    if(s.includes('facebook')||s.includes('fb'))return['fb_eco','fb_wood'];
    if(s.includes('сайт')||s.includes('site'))return['site_eco','site_wood'];
    return null;
}

function getActiveFb(mk){
    const a=new Set();
    globalLeads.forEach(l=>{
        const d=pd(l.date),lm=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
        if(lm!==mk)return;
        const s=String(l.source||'').toLowerCase();
        if(s.includes('facebook')&&(s.includes('ecoforma')||s.includes('екоформа')))a.add('fb_eco');
        if(s.includes('facebook')&&(s.includes('wood')||s.includes('вуд')))a.add('fb_wood');
    });
    return a;
}

function buildData(months){
    const empty=()=>({ad:0,zp:0,out:0,svc:0,other:0,leads:0,ca:0,sales:0,sum:0});
    const data={};
    months.forEach(m=>{data[m]={};SOURCES.forEach(s=>data[m][s.key]=empty());});

    globalSpend.forEach(s=>{
        const d=pd(s.date),mk=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
        if(!months.includes(mk))return;
        for(const mp of SPEND_MAP)if(mp.t(s.source.toLowerCase())){mp.keys.forEach(k=>{if(data[mk][k])data[mk][k].ad+=s.spend;});break;}
    });

    globalCosts.forEach(c=>{
        const mk=getMK(c.Month);if(!months.includes(mk))return;
        const type=String(c.Type||'').toLowerCase(),amount=c.Amount||0;
        let targets=mapCostsSrc(String(c.Source||''));
        if(!targets)targets=SOURCES.map(s=>s.key);
        if(targets.length>1){const af=getActiveFb(mk),am=targets.filter(k=>af.has(k));if(am.length>0)targets=am;}
        const share=amount/targets.length;
        targets.forEach(gk=>{
            if(!data[mk]?.[gk])return;
            if(type.includes('зп')&&!type.includes('аутсорс'))data[mk][gk].zp+=share;
            else if(type.includes('аутсорс')||type.includes('підрядник'))data[mk][gk].out+=share;
            else if(type.includes('сервіс')||type.includes('програм')||type.includes('кепшн')||type.includes('домен'))data[mk][gk].svc+=share;
            else data[mk][gk].other+=share;
        });
    });

    globalLeads.forEach(l=>{
        const d=pd(l.date),mk=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
        if(!months.includes(mk))return;
        const gk=findSrc(l.source,l.manager);
        if(gk&&data[mk]?.[gk]){data[mk][gk].leads++;if(l.status.toLowerCase()===STATUS_TARGET)data[mk][gk].ca++;}
    });

    globalAdvs.forEach(a=>{
        const d=pd(a.date),mk=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
        if(!months.includes(mk))return;
        const gk=findSrc(a.source,a.manager);
        if(gk&&data[mk]?.[gk]){data[mk][gk].sales++;data[mk][gk].sum+=a.amount;}
    });

    return data;
}

function calc(r){
    const tot=(r.ad||0)+(r.zp||0)+(r.out||0)+(r.svc||0)+(r.other||0);
    return{...r,tot,
        cplAd:  r.ad&&r.leads  ?r.ad/r.leads  :0,
        cplTot: tot&&r.leads   ?tot/r.leads    :0,
        cpcaAd: r.ad&&r.ca     ?r.ad/r.ca      :0,
        cpcaTot:tot&&r.ca      ?tot/r.ca        :0,
        cpcAd:  r.ad&&r.sales  ?r.ad/r.sales   :0,
        cpcTot: tot&&r.sales   ?tot/r.sales     :0,
        avgChk: r.sales&&r.sum ?r.sum/r.sales   :0,
        convCa: r.leads        ?r.ca/r.leads    :0,
        convS:  r.ca           ?r.sales/r.ca    :0,
    };
}

function sumObjs(arr){
    const k=['ad','zp','out','svc','other','leads','ca','sales','sum'];
    const res={};k.forEach(key=>res[key]=arr.reduce((s,r)=>s+(r[key]||0),0));
    return res;
}

// Колонки таблиці (показники)
const COLS=[
    {id:'tot',     label:'Загальні витрати',         fn:r=>fmtM(r.tot),   cls:'text-yellow-400 font-bold'},
    {id:'ad',      label:'💸 Рекламний бюджет',       fn:r=>fmtM(r.ad),    cls:'text-purple-300'},
    {id:'out',     label:'🤝 Оплата підряднику',      fn:r=>fmtM(r.out),   cls:'text-blue-300', sub:true},
    {id:'zp',      label:'👤 ЗП працівникам',         fn:r=>fmtM(r.zp),    cls:'text-blue-300', sub:true},
    {id:'svc',     label:'🛠 Сервіси',                fn:r=>fmtM(r.svc),   cls:'text-slate-400', sub:true},
    {id:'leads',   label:'👥 Ліди',                   fn:r=>r.leads||'—',  cls:'text-blue-300 font-bold'},
    {id:'cplAd',   label:'💰 Ціна ліда (реклама)',    fn:r=>r.cplAd?fmtM(r.cplAd):'—',   cls:'text-purple-300'},
    {id:'cplTot',  label:'💰 Ціна ліда (загальна)',   fn:r=>r.cplTot?fmtM(r.cplTot):'—', cls:'text-yellow-300'},
    {id:'ca',      label:'🎯 ЦА',                     fn:r=>r.ca||'—',     cls:'text-emerald-400 font-bold'},
    {id:'convCa',  label:'📈 Конверсія в ЦА',         fn:r=>pct(r.ca,r.leads), cls:'text-emerald-300'},
    {id:'cpcaAd',  label:'🎯 Ціна ЦА (реклама)',      fn:r=>r.cpcaAd?fmtM(r.cpcaAd):'—',   cls:'text-purple-300'},
    {id:'cpcaTot', label:'🎯 Ціна ЦА (загальна)',     fn:r=>r.cpcaTot?fmtM(r.cpcaTot):'—', cls:'text-yellow-300'},
    {id:'sales',   label:'🛒 Продажі',                fn:r=>r.sales||'—',  cls:'text-orange-400 font-bold'},
    {id:'convS',   label:'📊 Конверсія ЦА→Продаж',   fn:r=>pct(r.sales,r.ca), cls:'text-orange-300'},
    {id:'sum',     label:'💵 Сума продажів',           fn:r=>fmtM(r.sum),   cls:'text-yellow-500 font-bold'},
    {id:'avgChk',  label:'🧾 Середній чек',            fn:r=>r.avgChk?fmtM(r.avgChk):'—', cls:'text-yellow-300'},
    {id:'cpcAd',   label:'👤 Ціна клієнта (реклама)', fn:r=>r.cpcAd?fmtM(r.cpcAd):'—',   cls:'text-purple-300'},
    {id:'cpcTot',  label:'👤 Ціна клієнта (загальна)',fn:r=>r.cpcTot?fmtM(r.cpcTot):'—', cls:'text-yellow-300'},
];

let costsExpanded=false;
function toggleCosts(){
    costsExpanded=!costsExpanded;
    document.querySelectorAll('.sub-col').forEach(el=>el.style.display=costsExpanded?'':'none');
    document.querySelectorAll('.toggle-costs-btn').forEach(b=>b.textContent=costsExpanded?'▾ Деталі':'▸ Деталі');
}

function renderMonthBlock(mk,data){
    const d=data[mk];
    const visibleCols=COLS.filter(c=>!c.sub);

    // Заголовок таблиці
    const thCells=visibleCols.map(c=>`<th class="px-3 py-3 text-right text-[10px] text-slate-400 uppercase tracking-wider min-w-[110px]">${c.label}</th>`).join('');
    // Вставляємо кнопку деталей після "Загальні витрати"
    const thWithDetail=thCells.replace(
        '<th class="px-3 py-3 text-right text-[10px] text-slate-400 uppercase tracking-wider min-w-[110px]">💸 Рекламний бюджет</th>',
        `<th class="px-3 py-3 text-right text-[10px] text-slate-400 uppercase tracking-wider min-w-[110px]">
            <button class="toggle-costs-btn text-yellow-400 font-bold hover:text-yellow-300 transition" onclick="toggleCosts()">▸ Деталі</button>
         </th>`
    );

    // Підрядки деталей (ховаються)
    const subThCells=COLS.filter(c=>c.sub).map(c=>`<th class="sub-col px-3 py-3 text-right text-[10px] text-slate-400 uppercase tracking-wider min-w-[110px]" style="display:none">${c.label}</th>`).join('');

    let rows='';

    // Міні-бейджі ефективності по джерелах (оголошуємо ДО циклу)
    const effBadge=(srcKey)=>{
        const r=calc(d?.[srcKey]||{ad:0,zp:0,out:0,svc:0,other:0,leads:0,ca:0,sales:0,sum:0});
        if(!r.leads&&!r.ad) return '';
        const items=[];
        if(r.ad&&r.sum) items.push(`<span class="text-[9px] text-purple-300">ROAS: ${(r.sum/r.ad).toFixed(1)}x</span>`);
        if(r.leads) items.push(`<span class="text-[9px] text-emerald-300">ЦА: ${pct(r.ca,r.leads)}</span>`);
        return items.length?`<div class="flex gap-2 mt-1">${items.join('')}</div>`:'';
    };

    SOURCES.forEach(src=>{
        const r=calc(d?.[src.key]||{ad:0,zp:0,out:0,svc:0,other:0,leads:0,ca:0,sales:0,sum:0});
        const hasData=r.leads>0||r.ad>0||r.sales>0||r.zp>0||r.out>0;
        if(!hasData)return;

        const mainCells=visibleCols.map(c=>`<td class="px-3 py-2.5 text-right ${c.cls}">${c.fn(r)}</td>`).join('');
        const subCells=COLS.filter(c=>c.sub).map(c=>`<td class="sub-col px-3 py-2 text-right text-[11px] ${c.cls}" style="display:none">${c.fn(r)}</td>`).join('');

        rows+=`<tr class="src-row border-b border-slate-700/30 hover:bg-slate-800/20 transition">
            <td class="px-4 py-2.5 font-bold text-slate-200 sticky-col bg-slate-900/95">
                ${src.label}
                ${effBadge(src.key)}
            </td>
            ${mainCells}${subCells}
        </tr>`;
    });

    // Рядок ВСЬОГО
    const totRaw=sumObjs(SOURCES.map(s=>d?.[s.key]||{}));
    const tot=calc(totRaw);
    const totMain=visibleCols.map(c=>`<td class="px-3 py-2.5 text-right font-bold ${c.cls}">${c.fn(tot)}</td>`).join('');
    const totSub=COLS.filter(c=>c.sub).map(c=>`<td class="sub-col px-3 py-2 text-right text-[11px] font-bold ${c.cls}" style="display:none">${c.fn(tot)}</td>`).join('');

    rows+=`<tr class="total-row">
        <td class="px-4 py-3 font-black text-yellow-400 text-sm sticky-col bg-slate-900">📊 Всього</td>
        ${totMain}${totSub}
    </tr>`;

    // KPI плитки для місяця
    const totRawKpi=sumObjs(SOURCES.map(s=>d?.[s.key]||{}));
    const totKpi=calc(totRawKpi);
    const kpiCards=[
        {l:'📦 Загальні витрати',      v:fmtM(totKpi.tot),    c:'text-yellow-300'},
        {l:'💸 Рекламний бюджет',       v:fmtM(totKpi.ad),     c:'text-purple-300'},
        {l:'👥 Ліди',                   v:totKpi.leads||'—',   c:'text-blue-300'},
        {l:'🎯 Ціна ЦА (реклама)',      v:totKpi.cpcaAd?fmtM(totKpi.cpcaAd):'—', c:'text-purple-200'},
        {l:'🎯 Ціна ЦА (загальна)',     v:totKpi.cpcaTot?fmtM(totKpi.cpcaTot):'—', c:'text-yellow-200'},
        {l:'📈 Конверсія в ЦА',         v:pct(totKpi.ca,totKpi.leads), c:'text-emerald-300'},
        {l:'🛒 Продажі',                v:totKpi.sales||'—',   c:'text-orange-400'},
        {l:'💵 Сума продажів',           v:fmtM(totKpi.sum),    c:'text-yellow-500'},
        {l:'📊 Конверсія ЦА→Продаж',   v:pct(totKpi.sales,totKpi.ca), c:'text-orange-300'},
        {l:'👤 Ціна клієнта (загальна)',v:totKpi.cpcTot?fmtM(totKpi.cpcTot):'—', c:'text-yellow-200'},
    ].map(k=>`<div class="bg-slate-900/60 rounded-lg border border-slate-700/60 px-2 py-1.5 text-center flex-1 min-w-0">
        <p class="text-[8px] text-slate-500 uppercase font-bold tracking-wide mb-0.5 leading-tight truncate">${k.l}</p>
        <p class="text-xs font-black ${k.c} truncate">${k.v}</p>
    </div>`).join('');

    // Міні-бейджі ефективності по джерелах (ROAS і конверсія)
    
    return `
    <div class="bg-slate-800/20 rounded-2xl border border-slate-700 shadow-xl overflow-hidden mb-6">
        <div class="bg-yellow-950/20 px-6 py-3 border-b border-yellow-800/30">
            <h3 class="text-base font-black text-yellow-300 uppercase tracking-wider mb-3">${fmtMK(mk)}</h3>
            <div class="flex gap-1.5 overflow-x-auto">${kpiCards}</div>
        </div>
        <div class="overflow-x-auto">
            <table class="min-w-full text-xs border-collapse">
                <thead class="bg-slate-900/80 sticky top-0">
                    <tr>
                        <th class="px-4 py-3 text-left text-slate-400 text-[10px] font-bold uppercase tracking-wider min-w-[160px] sticky-col bg-slate-900">Джерело</th>
                        ${thWithDetail}${subThCells}
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        </div>
    </div>`;
}

function render(){
    if(!selectedMonths.length)return;
    const data=buildData(selectedMonths);

    // KPI — сума по всіх місяцях
    const allRaw=sumObjs(selectedMonths.flatMap(m=>SOURCES.map(s=>data[m]?.[s.key]||{})));
    const all=calc(allRaw);
    document.getElementById('kpiRow').innerHTML=[
        {l:'💸 Реклама',       v:fmtM(all.ad),    c:'text-purple-300'},
        {l:'📦 Всього витрат', v:fmtM(all.tot),   c:'text-yellow-300'},
        {l:'👥 Ліди',          v:all.leads||'—',  c:'text-blue-100'},
        {l:'🎯 ЦА',            v:all.ca||'—',     c:'text-emerald-300'},
        {l:'🛒 Продажі',       v:all.sales||'—',  c:'text-orange-400'},
        {l:'💵 Сума продажів', v:fmtM(all.sum),   c:'text-yellow-500'},
    ].map(k=>`<div class="bg-slate-800/50 rounded-xl border border-slate-700 px-4 py-3 text-center">
        <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest mb-1">${k.l}</p>
        <p class="text-xl font-black ${k.c}">${k.v}</p>
    </div>`).join('');

    // Блоки по місяцях
    document.getElementById('monthBlocks').innerHTML=selectedMonths.map(m=>renderMonthBlock(m,data)).join('');

    // Кнопка порівняти — тільки якщо 2+ місяці
    document.getElementById('compareBtn').classList.toggle('hidden',selectedMonths.length<2);
}

// ---- ПОРІВНЯННЯ ----
function openCompare(){
    const data=buildData(selectedMonths);

    // Показники для порівняння
    const COMPARE_METRICS=[
        {label:'💸 Витрачений рекламний бюджет', fn:r=>fmtM(r.ad),    inv:true},
        {label:'📦 Загальна сума витрат',         fn:r=>fmtM(r.tot),   inv:true},
        {label:'👥 Кількість лідів',              fn:r=>r.leads||'—',  inv:false},
        {label:'🎯 Кількість ЦА',                 fn:r=>r.ca||'—',     inv:false},
        {label:'📈 Конверсія в ЦА',               fn:r=>pct(r.ca,r.leads), inv:false},
        {label:'🎯 Ціна ЦА (від рекл. бюджету)',  fn:r=>r.cpcaAd?fmtM(r.cpcaAd):'—',   inv:true},
        {label:'🎯 Ціна ЦА (від заг. витрат)',    fn:r=>r.cpcaTot?fmtM(r.cpcaTot):'—', inv:true},
        {label:'🛒 Кількість продажів',            fn:r=>r.sales||'—',  inv:false},
        {label:'💵 Сума продажів',                fn:r=>fmtM(r.sum),   inv:false},
        {label:'📊 Конверсія в продаж',           fn:r=>pct(r.sales,r.ca), inv:false},
        {label:'👤 Ціна клієнта (від заг. витрат)',fn:r=>r.cpcTot?fmtM(r.cpcTot):'—', inv:true},
        {label:'👤 Ціна клієнта (від рекл. бюдж)',fn:r=>r.cpcAd?fmtM(r.cpcAd):'—',   inv:true},
    ];

    // Заголовок: Показник | Місяць1 | Місяць2 | ...
    const thM=selectedMonths.map(m=>`<th class="px-4 py-3 text-right text-yellow-300 min-w-[130px]">${fmtMK(m)}</th>`).join('');
    document.getElementById('compareHead').innerHTML=`<tr>
        <th class="px-4 py-3 text-left text-slate-400 min-w-[260px]">Показник</th>${thM}
    </tr>`;

    // Функція отримання числа з відформатованого значення
    const getNum=v=>parseFloat(String(v).replace(/[^\d.]/g,''))||0;

    // Функція клітинки зі стрілкою
    const mkCell=(r,prev,metric)=>{
        const val=metric.fn(r);
        let arrow='';
        if(prev){
            const n1=getNum(metric.fn(prev)),n2=getNum(val);
            if(n1&&n2&&n1!==n2){
                const p=((n2-n1)/n1*100),up=p>0,good=metric.inv?!up:up;
                arrow=` <span class="text-[10px] ${good?'text-emerald-400':'text-red-400'}">${up?'▲':'▼'}${Math.abs(p).toFixed(1)}%</span>`;
            }
        }
        return `${val}${arrow}`;
    };

    // Секція загального підсумку
    let tbody=`<tr><td colspan="${selectedMonths.length+1}" class="px-4 py-2 text-[10px] text-yellow-400 font-black uppercase tracking-widest bg-yellow-900/10">📊 Загальний підсумок (всі джерела)</td></tr>`;

    COMPARE_METRICS.forEach(metric=>{
        const vals=selectedMonths.map(m=>calc(sumObjs(SOURCES.map(s=>data[m]?.[s.key]||{}))));
        const cells=vals.map((r,i)=>`<td class="px-4 py-2 text-right font-bold text-xs">${mkCell(r,i>0?vals[i-1]:null,metric)}</td>`).join('');
        tbody+=`<tr class="hover:bg-slate-800/20 border-b border-slate-700/20 transition">
            <td class="px-4 py-2 text-slate-300 text-xs font-bold">${metric.label}</td>${cells}</tr>`;
    });

    // Секції по кожному джерелу
    SOURCES.forEach(src=>{
        // Перевіряємо чи є взагалі дані по джерелу
        const hasData=selectedMonths.some(m=>{
            const d2=data[m]?.[src.key];
            return d2&&(d2.leads>0||d2.ad>0||d2.sales>0);
        });
        if(!hasData)return;

        tbody+=`<tr><td colspan="${selectedMonths.length+1}" class="px-4 py-3 text-[10px] text-slate-300 font-black uppercase tracking-widest bg-slate-800/40 border-t border-slate-600/50">${src.label}</td></tr>`;

        COMPARE_METRICS.forEach(metric=>{
            const vals=selectedMonths.map(m=>calc(data[m]?.[src.key]||{ad:0,zp:0,out:0,svc:0,other:0,leads:0,ca:0,sales:0,sum:0}));
            const cells=vals.map((r,i)=>`<td class="px-4 py-2 text-right text-xs">${mkCell(r,i>0?vals[i-1]:null,metric)}</td>`).join('');
            tbody+=`<tr class="hover:bg-slate-800/20 border-b border-slate-700/10 transition">
                <td class="px-4 py-1.5 text-slate-400 text-[11px] pl-8">${metric.label}</td>${cells}</tr>`;
        });
    });

    document.getElementById('compareBody').innerHTML=tbody;

    // ---- БЛОК ЕФЕКТИВНОСТІ ----
    // Рахуємо по загальному підсумку для кожного місяця
    const effVals=selectedMonths.map(m=>calc(sumObjs(SOURCES.map(s=>data[m]?.[s.key]||{}))));

    // Показники ефективності
    const effMetrics=[
        {
            label:'💹 ROAS (від рекл. бюджету)',
            desc:'Скільки ₴ продажів на 1 ₴ реклами',
            fn:r=>r.ad&&r.sum?(r.sum/r.ad).toFixed(2)+'x':'—',
            inv:false, // більше = краще
        },
        {
            label:'📊 ROI маркетингу (від заг. витрат)',
            desc:'Скільки ₴ продажів на 1 ₴ всіх витрат',
            fn:r=>r.tot&&r.sum?(r.sum/r.tot).toFixed(2)+'x':'—',
            inv:false,
        },
        {
            label:'💰 Ефективність витрат на ліда',
            desc:'Ціна ліда від загальних витрат',
            fn:r=>r.cplTot?fmtM(r.cplTot):'—',
            inv:true, // менше = краще
        },
        {
            label:'🎯 Ефективність витрат на ЦА',
            desc:'Ціна ЦА від загальних витрат',
            fn:r=>r.cpcaTot?fmtM(r.cpcaTot):'—',
            inv:true,
        },
        {
            label:'🏆 Вартість клієнта (загальна)',
            desc:'Скільки коштує залучення 1 покупця',
            fn:r=>r.cpcTot?fmtM(r.cpcTot):'—',
            inv:true,
        },
    ];

    // Будуємо рядки ефективності
    let effRows='';
    effMetrics.forEach(metric=>{
        const cells=effVals.map((r,i)=>{
            const val=metric.fn(r);
            let arrow='';
            if(i>0){
                const n1=getNum(metric.fn(effVals[i-1])),n2=getNum(val);
                if(n1&&n2&&n1!==n2){
                    const p=((n2-n1)/n1*100),up=p>0,good=metric.inv?!up:up;
                    arrow=` <span class="text-[11px] font-black ${good?'text-emerald-400':'text-red-400'}">${up?'▲':'▼'}${Math.abs(p).toFixed(1)}%</span>`;
                }
            }
            return `<td class="px-4 py-3 text-right font-black text-sm">${val}${arrow}</td>`;
        }).join('');
        effRows+=`<tr class="border-b border-slate-700/30 hover:bg-slate-800/20 transition">
            <td class="px-4 py-3">
                <div class="text-slate-200 font-bold text-xs">${metric.label}</div>
                <div class="text-slate-500 text-[10px]">${metric.desc}</div>
            </td>${cells}</tr>`;
    });

    // Автоматичний текстовий висновок (тільки якщо 2 місяці)
    let conclusion='';
    if(effVals.length>=2){
        const prev=effVals[0],cur=effVals[effVals.length-1];
        const prevM=fmtMK(selectedMonths[0]),curM=fmtMK(selectedMonths[selectedMonths.length-1]);
        const lines=[];

        // ROAS
        if(prev.ad&&cur.ad){
            const r1=prev.sum/prev.ad,r2=cur.sum/cur.ad;
            if(r1&&r2){
                const better=r2>r1;
                lines.push(`${better?'✅':'⚠️'} ROAS ${better?'покращився':'погіршився'} з <b>${r1.toFixed(2)}x</b> до <b>${r2.toFixed(2)}x</b> — на 1 ₴ реклами стало ${better?'більше':'менше'} продажів.`);
            }
        }
        // ROI загальний
        if(prev.tot&&cur.tot){
            const r1=prev.sum/prev.tot,r2=cur.sum/cur.tot;
            if(r1&&r2){
                const better=r2>r1;
                lines.push(`${better?'✅':'⚠️'} ROI від загальних витрат ${better?'зріс':'впав'} з <b>${r1.toFixed(2)}x</b> до <b>${r2.toFixed(2)}x</b>.`);
            }
        }
        // Ціна клієнта
        if(prev.cpcTot&&cur.cpcTot){
            const better=cur.cpcTot<prev.cpcTot;
            const pctD=((cur.cpcTot-prev.cpcTot)/prev.cpcTot*100);
            lines.push(`${better?'✅':'⚠️'} Ціна клієнта (від загальних витрат) ${better?'знизилась':'зросла'} на <b>${Math.abs(pctD).toFixed(1)}%</b>: ${fmtM(prev.cpcTot)} → ${fmtM(cur.cpcTot)}.`);
        }
        // Конверсія
        if(prev.leads&&cur.leads){
            const c1=prev.ca/prev.leads,c2=cur.ca/cur.leads;
            if(c1&&c2){
                const better=c2>c1;
                lines.push(`${better?'✅':'⚠️'} Конверсія в ЦА ${better?'покращилась':'погіршилась'}: ${(c1*100).toFixed(1)}% → ${(c2*100).toFixed(1)}%.`);
            }
        }
        // Загальний вердикт
        const roasOk=cur.ad&&cur.sum&&(cur.sum/cur.ad)>(prev.sum/prev.ad||0);
        const roiOk=cur.tot&&cur.sum&&(cur.sum/cur.tot)>(prev.sum/prev.tot||0);
        const verdict=roasOk&&roiOk
            ? `🏆 <b>${curM} ефективніший за ${prevM}</b> — і ROAS і ROI покращились попри зміни у витратах.`
            : !roasOk&&!roiOk
            ? `📉 <b>${curM} менш ефективний за ${prevM}</b> — обидва показники погіршились.`
            : `⚖️ <b>Змішана картина:</b> один показник покращився, інший погіршився — варто аналізувати детальніше.`;

        conclusion=`<div class="mt-4 p-4 rounded-xl bg-slate-800/60 border border-slate-600">
            <p class="text-[10px] text-slate-400 uppercase font-black tracking-widest mb-3">🤖 Автоматичний аналіз: ${prevM} → ${curM}</p>
            <div class="space-y-2">${lines.map(l=>`<p class="text-slate-300 text-xs">${l}</p>`).join('')}</div>
            <div class="mt-3 pt-3 border-t border-slate-700">
                <p class="text-sm font-bold text-white">${verdict}</p>
            </div>
        </div>`;
    }

    document.getElementById('compareEfficiency').innerHTML=`
        <div class="px-6 pb-2 pt-4 border-t border-slate-700">
            <p class="text-[10px] text-blue-400 uppercase font-black tracking-widest mb-3">📈 Аналіз ефективності витрат</p>
            <div class="overflow-x-auto">
                <table class="min-w-full text-sm">
                    <thead><tr>
                        <th class="px-4 py-2 text-left text-slate-400 text-[10px] uppercase min-w-[250px]">Показник</th>
                        ${selectedMonths.map(m=>`<th class="px-4 py-2 text-right text-yellow-300 text-[10px] uppercase min-w-[130px]">${fmtMK(m)}</th>`).join('')}
                    </tr></thead>
                    <tbody class="divide-y divide-slate-700/30">${effRows}</tbody>
                </table>
            </div>
            ${conclusion}
        </div>`;

    document.getElementById('compareModal').classList.add('open');
}

function closeCompare(){
    document.getElementById('compareModal').classList.remove('open');
}

// Клік поза модальним — закрити
document.getElementById('compareModal').addEventListener('click',e=>{
    if(e.target===document.getElementById('compareModal'))closeCompare();
});

function initFilter(){
    const ms=new Set();
    globalCosts.forEach(c=>{const mk=getMK(c.Month);if(mk?.includes('-'))ms.add(mk);});
    globalSpend.forEach(s=>{const d=pd(s.date);if(d.getFullYear()>2000)ms.add(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));});
    const months=[...ms].filter(m=>m&&m.includes('-')).sort();
    if(!selectedMonths.length)selectedMonths=months.slice(-3);
    document.getElementById('monthFilter').innerHTML=months.map(m=>`
        <button onclick="toggleMonth('${m}')" class="tab-btn px-3 py-1.5 font-bold text-xs rounded-lg border border-transparent transition ${selectedMonths.includes(m)?'tab-active':'text-slate-400 hover:bg-slate-800'}">
            ${fmtMK(m)}
        </button>`).join('');
}

function toggleMonth(m){
    selectedMonths.includes(m)
        ?(selectedMonths.length>1&&(selectedMonths=selectedMonths.filter(x=>x!==m)))
        :(selectedMonths.push(m),selectedMonths.sort());
    initFilter();render();
}

async function fetchAllData(){
    document.getElementById('loader').classList.remove('hidden');
    try{
        const clean=arr=>(arr||[]).map(o=>{const c={};for(let k in o)c[k.trim()]=o[k];return c;});
        const main=await(await fetch(API_URL)).json();
        globalLeads=clean(main.leads||[]).map(r=>({date:String(r['Дата створення']||'').trim(),source:String(r['Джерело']||'').trim(),manager:String(r['Відповідальний']||'').trim(),status:String(r['Якість ліда']||'').trim()}));
        globalAdvs=clean(main.advs||[]).map(r=>({date:String(r['Дата авансу']||'').trim(),source:String(r['Джерело']||'').trim(),manager:String(r['Відповідальний']||'').trim(),amount:parseFloat(String(r['Сума угоди']||0).replace(/\s/g,''))||0}));

        globalSpend=[];
        try{const sd=await(await fetch(SPEND_API_URL)).json();globalSpend=clean(Array.isArray(sd)?sd:[]).filter(r=>!String(r['Campaign Name']||'').toLowerCase().includes('вакансі')).map(r=>({date:String(r['Date']||'').trim(),source:String(r['Source']||'').trim(),spend:parseFloat(r['Spend']||0)||0}));}catch(e){console.warn(e);}

        globalCosts=[];
        try{const cd=await(await fetch(COSTS_API_URL)).json();globalCosts=clean(Array.isArray(cd)?cd:[]).map(r=>({Month:String(r['Month']||'').trim(),Type:String(r['Type']||'').trim(),Source:String(r['Source']||'').trim(),Amount:parseFloat(String(r['Amount']||0).replace(/\s/g,''))||0}));}catch(e){console.warn(e);}

        const d=document.getElementById('diagBox');
        d.innerHTML=`✅ Ліди:<b>${globalLeads.length}</b> Spend:<b>${globalSpend.length}</b> Витрати:<b>${globalCosts.length}</b>`;
        d.style.display='block';setTimeout(()=>d.style.display='none',5000);

        initFilter();render();
    }catch(e){alert('Помилка: '+e.message);}
    finally{document.getElementById('loader').classList.add('hidden');}
}

window.onload=()=>fetchAllData();
</script>
