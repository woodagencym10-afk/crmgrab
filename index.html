<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Analytics — Вхід</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    body { background: #0f172a; }
    .card { background: linear-gradient(135deg, #1e293b, #0f1f35); }
    input:-webkit-autofill { -webkit-box-shadow: 0 0 0 100px #1e293b inset !important; -webkit-text-fill-color: #f1f5f9 !important; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    .shake { animation: shake 0.4s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="fade-in w-full max-w-sm">
    <!-- Лого -->
    <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-white uppercase tracking-tight">
             <span class="text-blue-500">Analytics</span>
        </h1>
        <p class="text-slate-500 text-sm mt-1">Система внутрішньої аналітики</p>
    </div>

    <!-- Картка входу -->
    <div class="card rounded-2xl border border-slate-700 shadow-2xl p-8">
        <h2 class="text-lg font-black text-white mb-6 text-center">Вхід до системи</h2>

        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-blue-400 uppercase tracking-widest block mb-1.5">Логін</label>
                <input 
                    id="loginInput"
                    type="text" 
                    placeholder="Введіть логін"
                    autocomplete="username"
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white text-sm outline-none focus:border-blue-500 transition placeholder-slate-600"
                    onkeydown="if(event.key==='Enter') document.getElementById('passwordInput').focus()"
                >
            </div>
            <div>
                <label class="text-[10px] font-bold text-blue-400 uppercase tracking-widest block mb-1.5">Пароль</label>
                <div class="relative">
                    <input 
                        id="passwordInput"
                        type="password" 
                        placeholder="Введіть пароль"
                        autocomplete="current-password"
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white text-sm outline-none focus:border-blue-500 transition placeholder-slate-600 pr-12"
                        onkeydown="if(event.key==='Enter') doLogin()"
                    >
                    <button onclick="togglePass()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition text-lg">👁</button>
                </div>
            </div>
        </div>

        <!-- Помилка -->
        <div id="errorBox" class="hidden mt-4 bg-red-900/30 border border-red-800/50 rounded-lg px-4 py-2.5 text-red-400 text-sm font-bold text-center"></div>

        <!-- Вибір сторінки після входу -->
        <div id="choiceBox"></div>

        <!-- Кнопка -->
        <button 
            id="loginBtn"
            onclick="doLogin()" 
            class="mt-6 w-full bg-blue-600 hover:bg-blue-700 active:scale-95 text-white font-black py-3 rounded-lg text-sm transition shadow-lg uppercase tracking-wider"
        >
            Увійти →
        </button>
    </div>

    <p class="text-center text-slate-600 text-xs mt-6">© Kk. Доступ тільки для авторизованих користувачів.</p>
</div>

<script>
// ⬇️ ВСТАВТЕ URL вашого Auth Apps Script після розгортання
const AUTH_URL = "https://script.google.com/macros/s/AKfycbxYesBlsepfgj5KuR0LSVjDMT_4_9301Qmg9Iy2WzT7CpflwwDaVoBB_Y0lDDeFnXNx/exec";

function togglePass() {
    const inp = document.getElementById('passwordInput');
    inp.type = inp.type === 'password' ? 'text' : 'password';
}

function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = msg;
    box.classList.remove('hidden');
    document.querySelector('.card').classList.add('shake');
    setTimeout(() => document.querySelector('.card').classList.remove('shake'), 400);
}

async function doLogin() {
    const login = document.getElementById('loginInput').value.trim();
    const password = document.getElementById('passwordInput').value.trim();
    const btn = document.getElementById('loginBtn');

    if (!login || !password) {
        showError('Введіть логін та пароль');
        return;
    }

    btn.textContent = '⏳ Перевірка...';
    btn.disabled = true;
    document.getElementById('errorBox').classList.add('hidden');

    try {
        const url = `${AUTH_URL}?login=${encodeURIComponent(login)}&password=${encodeURIComponent(password)}`;
        const res = await fetch(url);
        const data = await res.json();

        if (data.success) {
            // Зберігаємо сесію в sessionStorage (закривається з вкладкою)
            sessionStorage.setItem('sd_role', data.role);
            sessionStorage.setItem('sd_sources', data.sources);
            sessionStorage.setItem('sd_login', login);
            sessionStorage.setItem('sd_auth', '1');

            btn.textContent = '✅ Вхід...';

            const pages = data.redirect.split(',').map(p => p.trim()).filter(Boolean);

            if (pages.length === 1) {
                // Одна сторінка — одразу перекидаємо
                setTimeout(() => {
                    window.location.href = pages[0] + 
                        '?role=' + encodeURIComponent(data.role) + 
                        '&sources=' + encodeURIComponent(data.sources);
                }, 300);
            } else {
                // Кілька сторінок — показуємо вибір
                btn.classList.add('hidden');
                const labels = {
                    'marketing.html': '📊 Маркетинг',
                    'dashboard.html': '📈 Дашборд менеджерів'
                };
                const params = '?role=' + encodeURIComponent(data.role) + '&sources=' + encodeURIComponent(data.sources);
                document.getElementById('errorBox').classList.add('hidden');
                
                const choiceHtml = `
                    <div class="mt-2">
                        <p class="text-emerald-400 font-bold text-sm text-center mb-4">✅ Вхід успішний! Оберіть розділ:</p>
                        <div class="flex flex-col gap-3">
                            ${pages.map(p => `
                                <a href="${p}${params}" class="block w-full bg-slate-800 hover:bg-slate-700 border border-slate-600 hover:border-blue-500 text-white font-bold py-3 px-4 rounded-lg text-sm transition text-center">
                                    ${labels[p] || p}
                                </a>
                            `).join('')}
                        </div>
                    </div>`;
                
                document.getElementById('choiceBox').innerHTML = choiceHtml;
            }
        } else {
            showError(data.error || 'Невірний логін або пароль');
            btn.textContent = 'Увійти →';
            btn.disabled = false;
        }
    } catch(e) {
        showError('Помилка з\'єднання з сервером');
        btn.textContent = 'Увійти →';
        btn.disabled = false;
    }
}
</script>
</body>
</html>
