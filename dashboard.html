<!-- ═══════════════════════════════════════════════════════ -->
<!-- СУМА УГОД ЗА ДЖЕРЕЛАМИ (Area Chart)                    -->
<!-- Вставити ПІСЛЯ блоку <!-- ТРАФІК + ВОРОНКА -->          -->
<!-- тобто після закриваючого </div> того grid-блоку         -->
<!-- ═══════════════════════════════════════════════════════ -->

<div class="bg-dark-card rounded-xl border border-dark-border mb-8 overflow-hidden shadow-xl">
    <div class="bg-slate-800 p-4 border-b border-dark-border flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
        <div>
            <h3 class="text-sm font-bold text-white uppercase tracking-widest">📈 Сума виграних угод за джерелами</h3>
            <p id="areaSubtitle" class="text-xs text-dark-subtle mt-0.5">Динаміка · на основі дати авансу</p>
        </div>
        <div class="flex bg-slate-900 rounded-lg overflow-hidden border border-dark-border">
            <button id="btnAreaSum"   onclick="setAreaMode('sum')"   class="tab-btn active px-4 py-1.5 text-xs font-bold text-slate-300">&#8372; Сума</button>
            <button id="btnAreaCount" onclick="setAreaMode('count')" class="tab-btn px-4 py-1.5 text-xs font-bold text-slate-300">&#128290; Кількість</button>
        </div>
    </div>

    <div id="areaLegendRow" class="flex flex-wrap items-center gap-x-5 gap-y-2 px-5 pt-4 pb-1 min-h-[36px]"></div>

    <div class="relative h-[280px] md:h-[340px] px-2 pb-2">
        <canvas id="dealAreaChart"></canvas>
    </div>

    <div id="areaSummaryRow" class="grid grid-cols-2 sm:grid-cols-4 gap-3 px-5 pb-5 border-t border-dark-border pt-4"></div>
</div>

<script>
(function () {

    const SRC_COLORS = {
        'Сайт Wood Agency':    { line: '#818cf8', fill: 'rgba(129,140,248,0.30)' },
        'Сайт EcoForma':       { line: '#f59e0b', fill: 'rgba(245,158,11,0.28)'  },
        'Facebook Wood Agency':{ line: '#ec4899', fill: 'rgba(236,72,153,0.25)'  },
        'Facebook Ecoforma':   { line: '#a78bfa', fill: 'rgba(167,139,250,0.25)' },
        'OLX':                 { line: '#34d399', fill: 'rgba(52,211,153,0.25)'  },
        'Дзвінок':             { line: '#fb923c', fill: 'rgba(251,146,60,0.25)'  },
        'Інше':                { line: '#64748b', fill: 'rgba(100,116,139,0.20)' },
    };
    const FALLBACKS = [
        { line: '#60a5fa', fill: 'rgba(96,165,250,0.25)'  },
        { line: '#f472b6', fill: 'rgba(244,114,182,0.25)' },
        { line: '#4ade80', fill: 'rgba(74,222,128,0.25)'  },
        { line: '#facc15', fill: 'rgba(250,204,21,0.25)'  },
    ];
    let _fbIdx = 0;
    const colorOf = (src) => SRC_COLORS[src] || FALLBACKS[(_fbIdx++) % FALLBACKS.length];

    let areaMode      = 'sum';
    let areaChartInst = null;

    function advGroup(a) {
        let s  = String(a['Джерело'] || a.source || '').trim();
        const m = String(a['Відповідальний'] || a['Менеджер'] || a.manager || '').toLowerCase();
        const ls = s.toLowerCase();
        if (!s || ls === 'undefined' || ls === '') return 'Інше';
        if (ls === 'інше' || ls === 'other') return 'Інше';
        if (ls === 'дзвінок' && m.includes('савчук')) return 'Сайт Wood Agency';
        if (ls === 'дзвінок') return 'Дзвінок';
        if (ls.includes('facebook') && (ls.includes('ecoforma') || ls.includes('екоформа'))) return 'Facebook Ecoforma';
        if (ls.includes('facebook') && (ls.includes('wood')    || ls.includes('вуд')))       return 'Facebook Wood Agency';
        if (ls.includes('дзвінок')  && (ls.includes('ecoforma')|| ls.includes('сайт')))      return 'Сайт EcoForma';
        if (ls.includes('ecoforma') || ls.includes('екоформа')) return 'Сайт EcoForma';
        if (ls.includes('wood')     || ls.includes('відповідальним')) return 'Сайт Wood Agency';
        if (ls.includes('olx')) return 'OLX';
        return s;
    }

    function toDateStr(raw) {
        if (!raw) return null;
        const s = String(raw).trim();
        if (/^\d{1,2}\.\d{1,2}\.\d{4}/.test(s)) {
            const p = s.split(/[. :]/);
            const d = new Date(+p[2], +p[1]-1, +p[0]);
            return isNaN(d) ? null : d.toISOString().slice(0, 10);
        }
        const d = new Date(s);
        return isNaN(d) ? null : d.toISOString().slice(0, 10);
    }

    function getGranularity(s, e) {
        if (!s || !e) return 'day';
        const diff = (new Date(e) - new Date(s)) / 86400000;
        if (diff <= 35)  return 'day';
        if (diff <= 120) return 'week';
        return 'month';
    }

    function bucketKey(dateStr, gran) {
        const d = new Date(dateStr + 'T00:00:00');
        if (gran === 'month') return dateStr.slice(0, 7);
        if (gran === 'week') {
            const day = d.getDay() || 7;
            const mon = new Date(d); mon.setDate(d.getDate() - day + 1);
            return mon.toISOString().slice(0, 10);
        }
        return dateStr;
    }

    function bucketLabel(key, gran) {
        if (gran === 'month') {
            const [y, m] = key.split('-');
            return new Date(+y, +m-1, 1).toLocaleDateString('uk-UA', { month: 'short', year: '2-digit' });
        }
        if (gran === 'week') {
            const d = new Date(key + 'T00:00:00');
            const end = new Date(d); end.setDate(d.getDate() + 6);
            return d.toLocaleDateString('uk-UA', { day:'2-digit', month:'short' })
                + '\u2013' + end.toLocaleDateString('uk-UA', { day:'2-digit', month:'short' });
        }
        return new Date(key + 'T00:00:00').toLocaleDateString('uk-UA', { day: '2-digit', month: 'short' });
    }

    window.renderAreaChart = function (advData) {
        _fbIdx = 0;

        const startStr = document.getElementById('dateStart').value;
        const endStr   = document.getElementById('dateEnd').value;
        const gran     = getGranularity(startStr, endStr);
        const granLabel = { day: 'по днях', week: 'по тижнях', month: 'по місяцях' }[gran];
        document.getElementById('areaSubtitle').innerText = 'Динаміка ' + granLabel + ' \u00B7 на основі дати авансу';

        const bucketMap = {};
        const srcSet    = new Set();

        advData.forEach(a => {
            const grp     = advGroup(a);
            const dateStr = toDateStr(a['Дата авансу'] || a.date || a.dateUpdate || '');
            if (!dateStr) return;
            const bk  = bucketKey(dateStr, gran);
            const val = parseFloat(String(a['Сума угоди'] || a['Сума'] || a.dealAmount || 0).replace(/\s/g, '')) || 0;
            if (!bucketMap[bk]) bucketMap[bk] = {};
            if (!bucketMap[bk][grp]) bucketMap[bk][grp] = { sum: 0, count: 0 };
            bucketMap[bk][grp].sum   += val;
            bucketMap[bk][grp].count += 1;
            srcSet.add(grp);
        });

        const allBuckets = Object.keys(bucketMap).sort();
        const sources    = Array.from(srcSet).sort();

        if (allBuckets.length === 0) {
            if (areaChartInst) { areaChartInst.destroy(); areaChartInst = null; }
            document.getElementById('areaLegendRow').innerHTML =
                '<span class="text-xs text-slate-500">Немає даних авансів у вибраному діапазоні</span>';
            document.getElementById('areaSummaryRow').innerHTML = '';
            return;
        }

        const datasets = sources.map(src => {
            const c = colorOf(src);
            return {
                label: src,
                data:  allBuckets.map(bk => bucketMap[bk][src] ? bucketMap[bk][src][areaMode] : 0),
                backgroundColor: c.fill,
                borderColor:     c.line,
                borderWidth: 2.5,
                fill: true,
                tension: 0.4,
                pointRadius:      allBuckets.length <= 20 ? 4 : 2,
                pointHoverRadius: 7,
                pointBackgroundColor: c.line,
                pointBorderColor: '#0f172a',
                pointBorderWidth: 1.5,
            };
        });

        if (areaChartInst) areaChartInst.destroy();
        const ctx = document.getElementById('dealAreaChart').getContext('2d');
        areaChartInst = new Chart(ctx, {
            type: 'line',
            data: { labels: allBuckets.map(bk => bucketLabel(bk, gran)), datasets },
            options: {
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    datalabels: { display: false },
                    legend:     { display: false },
                    tooltip: {
                        backgroundColor: '#1e293b',
                        borderColor:     '#334155',
                        borderWidth: 1,
                        titleColor: '#94a3b8',
                        bodyColor:  '#f1f5f9',
                        padding: 14,
                        itemSort: (a, b) => b.parsed.y - a.parsed.y,
                        callbacks: {
                            label: function(ctx) {
                                const v = ctx.parsed.y;
                                if (!v) return null;
                                return areaMode === 'sum'
                                    ? ' ' + ctx.dataset.label + ': \u20B4' + Math.round(v).toLocaleString('uk-UA')
                                    : ' ' + ctx.dataset.label + ': ' + v + ' угод';
                            },
                            footer: function(items) {
                                const total = items.reduce((s, i) => s + i.parsed.y, 0);
                                if (!total) return '';
                                return areaMode === 'sum'
                                    ? 'Разом: \u20B4' + Math.round(total).toLocaleString('uk-UA')
                                    : 'Разом: ' + total + ' угод';
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: { color: '#94a3b8', font: { size: 10 }, maxRotation: 30, autoSkip: true, maxTicksLimit: 16 },
                        grid:  { color: 'rgba(255,255,255,0.04)' }
                    },
                    y: {
                        stacked: true,
                        ticks: {
                            color: '#94a3b8', font: { size: 10 },
                            callback: function(v) {
                                if (areaMode !== 'sum') return v;
                                if (v >= 1000000) return '\u20B4' + (v/1000000).toFixed(1) + 'M';
                                if (v >= 1000)    return '\u20B4' + (v/1000).toFixed(0) + 'k';
                                return '\u20B4' + v;
                            }
                        },
                        grid: { color: 'rgba(255,255,255,0.06)' },
                        beginAtZero: true
                    }
                }
            }
        });

        // Легенда
        document.getElementById('areaLegendRow').innerHTML = sources.map(src => {
            const c = colorOf(src);
            return '<span class="flex items-center gap-1.5 text-xs text-slate-300 font-medium">'
                + '<span class="inline-block w-3 h-3 rounded-sm flex-shrink-0" style="background:' + c.line + '"></span>'
                + src + '</span>';
        }).join('');

        // Підсумки
        const totals = {};
        sources.forEach(src => {
            totals[src] = { sum: 0, count: 0 };
            allBuckets.forEach(bk => {
                if (bucketMap[bk][src]) {
                    totals[src].sum   += bucketMap[bk][src].sum;
                    totals[src].count += bucketMap[bk][src].count;
                }
            });
        });

        document.getElementById('areaSummaryRow').innerHTML = sources.map(src => {
            const c   = colorOf(src);
            const t   = totals[src];
            const avg = t.count ? Math.round(t.sum / t.count).toLocaleString('uk-UA') : 0;
            return '<div class="bg-slate-900/60 rounded-xl px-3 py-2.5 border border-slate-700/50">'
                + '<div class="flex items-center gap-1.5 mb-1">'
                + '<span class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:' + c.line + '"></span>'
                + '<span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider truncate">' + src + '</span>'
                + '</div>'
                + '<span class="text-base font-black text-white block">\u20B4' + Math.round(t.sum).toLocaleString('uk-UA') + '</span>'
                + '<span class="text-[10px] text-slate-500">' + t.count + ' угод \u00B7 сер. \u20B4' + avg + '</span>'
                + '</div>';
        }).join('');
    };

    window.setAreaMode = function (mode) {
        areaMode = mode;
        document.getElementById('btnAreaSum').classList.toggle('active', mode === 'sum');
        document.getElementById('btnAreaCount').classList.toggle('active', mode === 'count');
        renderAreaChart(window.mainAdvData || []);
    };

    // Підключення до циклу рендеру дашборду
    const _orig = window.applyLocalFiltersAndRender;
    window.applyLocalFiltersAndRender = function () {
        _orig();
        renderAreaChart(window.mainAdvData || []);
    };

})();
</script>
